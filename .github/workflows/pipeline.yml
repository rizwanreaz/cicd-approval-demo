name: CI/CD Pipeline

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Figures out which stage (development/testing/production) this run belongs
  # to, based on the branch that was pushed to or the PR's base branch.
  detect-branch:
    name: Detect branch / stage
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.detect.outputs.branch }}
      stage: ${{ steps.detect.outputs.stage }}
      label: ${{ steps.detect.outputs.label }}
    steps:
      - name: Determine target branch and stage
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          case "$BRANCH" in
            dev)
              STAGE=development
              ;;
            test)
              STAGE=testing
              ;;
            main)
              STAGE=production
              ;;
            *)
              echo "::error::Unrecognized branch '$BRANCH'"
              exit 1
              ;;
          esac

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "label=$STAGE" >> "$GITHUB_OUTPUT"
          echo "Branch '$BRANCH' -> stage '$STAGE'"

  build-and-test:
    name: Build and test
    needs: detect-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, pdo_mysql
          coverage: none

      - name: Lint PHP files
        run: find public src -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  # Production only: seed a throwaway MySQL instance from db/init.sql, take
  # a mysqldump backup, and commit it into db/backups/ in the repo.
  # Restricted to `push` because there's no reason to snapshot a database on
  # a proposed (unmerged) PR change.
  backup-production:
    name: MySQL backup (production)
    needs: [detect-branch, build-and-test]
    if: needs.detect-branch.outputs.stage == 'production' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: logindemo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: logindemo
      MYSQL_ROOT_PASSWORD: root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 10); do
            mysqladmin ping -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" --silent && break
            echo "Waiting for mysql..."
            sleep 3
          done

      - name: Seed database with sample data
        run: mysql -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" < db/init.sql

      - name: Take mysqldump backup
        run: |
          mkdir -p db/backups
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          mysqldump -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" > "db/backups/${MYSQL_DATABASE}-${TIMESTAMP}.sql"

      - name: Commit backup to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "db/backups/${MYSQL_DATABASE}-${TIMESTAMP}.sql"
          git commit -m "Add MySQL backup ${TIMESTAMP}"
          git push origin HEAD:${{ github.ref_name }}

  # Builds the app image and pushes it to GHCR. Runs after build-and-test
  # succeeds, only for pushes (not PRs) - a proposed change doesn't need a
  # published image. All three branches get an image so dev/test/main each
  # have something deployable; only `main` also gets the "latest" tag.
  build-image:
    name: Build and push image
    needs: [detect-branch, build-and-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${IMAGE}:${{ github.sha }}"
          if [ "${{ needs.detect-branch.outputs.branch }}" = "main" ]; then
            TAGS="${TAGS}
          ${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # Production only: proves the app is actually Kubernetes-deployable by
  # spinning up a throwaway kind (Kubernetes-in-Docker) cluster on the
  # runner, loading the image build-image just pushed, and applying the
  # manifests in k8s/ - all without needing a real cluster or cloud account.
  validate-k8s-deploy:
    name: Validate Kubernetes deploy (kind)
    needs: [detect-branch, build-image]
    if: needs.detect-branch.outputs.stage == 'production' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: cicd-demo

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images and load them into kind
        run: |
          docker pull "$IMAGE"
          docker pull mysql:8.0
          kind load docker-image "$IMAGE" mysql:8.0 --name cicd-demo

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create configmap mysql-init -n production \
            --from-file=init.sql=db/init.sql --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/mysql-secret.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          sed "s|IMAGE_PLACEHOLDER|$IMAGE|" k8s/app-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/app-service.yaml

      - name: Wait for rollout
        run: |
          kubectl -n production rollout status deployment/mysql --timeout=240s || {
            echo "--- mysql pod describe ---"
            kubectl -n production describe pods -l app=mysql
            echo "--- mysql pod logs ---"
            kubectl -n production logs -l app=mysql --tail=200
            exit 1
          }
          kubectl -n production rollout status deployment/app --timeout=120s || {
            echo "--- app pod describe ---"
            kubectl -n production describe pods -l app=cicd-approval-demo
            echo "--- app pod logs ---"
            kubectl -n production logs -l app=cicd-approval-demo --tail=200
            exit 1
          }

      - name: Smoke test through the Service
        run: |
          kubectl -n production port-forward svc/app 8080:80 &
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/login.php > /dev/null && break
            sleep 2
          done
          curl -sf http://localhost:8080/login.php > /dev/null
          echo "Login page reachable through the Kubernetes Service."

  # Deploys using a GitHub Environment named after the stage, so
  # "production" can carry required-reviewer protection rules configured in
  # the repo settings. Restricted to `push` for the same reason as the
  # backup job - only real commits on dev/test/main get deployed.
  deploy:
    name: Deploy (${{ needs.detect-branch.outputs.stage }})
    needs: [detect-branch, build-and-test, backup-production, build-image, validate-k8s-deploy]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.build-and-test.result == 'success' &&
      needs.build-image.result == 'success' &&
      (needs.backup-production.result == 'success' || needs.backup-production.result == 'skipped') &&
      (needs.validate-k8s-deploy.result == 'success' || needs.validate-k8s-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-branch.outputs.stage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploying branch '${{ needs.detect-branch.outputs.branch }}' to ${{ needs.detect-branch.outputs.stage }}"
          echo "Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # Replace with real deployment steps (e.g. ssh, cloud CLI, container push)
