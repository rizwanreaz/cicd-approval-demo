name: CI/CD Pipeline

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Figures out which stage (development/testing/production) this run belongs
  # to, based on the branch that was pushed to or the PR's base branch.
  detect-branch:
    name: Detect branch / stage
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.detect.outputs.branch }}
      stage: ${{ steps.detect.outputs.stage }}
      label: ${{ steps.detect.outputs.label }}
    steps:
      - name: Determine target branch and stage
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          case "$BRANCH" in
            dev)
              STAGE=development
              ;;
            test)
              STAGE=testing
              ;;
            main)
              STAGE=production
              ;;
            *)
              echo "::error::Unrecognized branch '$BRANCH'"
              exit 1
              ;;
          esac

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "label=$STAGE" >> "$GITHUB_OUTPUT"
          echo "Branch '$BRANCH' -> stage '$STAGE'"

  build-and-test:
    name: Build and test
    needs: detect-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: find public -name '*.php' -print0 | xargs -0 -n1 php -l

  # Production only: seed a throwaway MySQL instance from db/init.sql, take
  # a mysqldump backup, and commit it into db/backups/ in the repo.
  # Restricted to `push` because there's no reason to snapshot a database on
  # a proposed (unmerged) PR change.
  backup-production:
    name: MySQL backup (production)
    needs: [detect-branch, build-and-test]
    if: needs.detect-branch.outputs.stage == 'production' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: logindemo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: logindemo
      MYSQL_ROOT_PASSWORD: root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 10); do
            mysqladmin ping -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" --silent && break
            echo "Waiting for mysql..."
            sleep 3
          done

      - name: Seed database with sample data
        run: mysql -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" < db/init.sql

      - name: Take mysqldump backup
        run: |
          mkdir -p db/backups
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          mysqldump -h "$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" > "db/backups/${MYSQL_DATABASE}-${TIMESTAMP}.sql"

      - name: Commit backup to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "db/backups/${MYSQL_DATABASE}-${TIMESTAMP}.sql"
          git commit -m "Add MySQL backup ${TIMESTAMP}"
          git push origin HEAD:${{ github.ref_name }}

  # Deploys using a GitHub Environment named after the stage, so
  # "production" can carry required-reviewer protection rules configured in
  # the repo settings. Restricted to `push` for the same reason as the
  # backup job - only real commits on dev/test/main get deployed.
  deploy:
    name: Deploy (${{ needs.detect-branch.outputs.stage }})
    needs: [detect-branch, build-and-test, backup-production]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.build-and-test.result == 'success' &&
      (needs.backup-production.result == 'success' || needs.backup-production.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-branch.outputs.stage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploying branch '${{ needs.detect-branch.outputs.branch }}' to ${{ needs.detect-branch.outputs.stage }}"
          # Replace with real deployment steps (e.g. ssh, cloud CLI, container push)
