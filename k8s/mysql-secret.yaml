# Demo-only credentials, matching docker-compose.yml. This is fine for a
# disposable kind cluster created fresh in CI (or locally) - it is not meant
# to model how you'd manage secrets in a real production cluster.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: production
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: logindemo
