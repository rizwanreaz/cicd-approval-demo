apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: production
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-credentials
          volumeMounts:
            # db/init.sql, loaded into this ConfigMap at apply time (see
            # k8s/README.md) rather than duplicated into a committed manifest.
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            # First boot runs the initdb scripts (schema + seed data) before
            # MySQL starts accepting connections, which can take a while on
            # a loaded CI runner - give it up to ~3 minutes past the initial
            # delay before giving up.
            failureThreshold: 36
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init
        # A disposable kind cluster is recreated every run, so there's no
        # need for a PersistentVolumeClaim here.
        - name: data
          emptyDir: {}
