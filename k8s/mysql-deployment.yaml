apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: production
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-credentials
          volumeMounts:
            # db/init.sql, loaded into this ConfigMap at apply time (see
            # k8s/README.md) rather than duplicated into a committed manifest.
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
          # First boot runs the initdb scripts (schema + seed data), which
          # can take a couple of minutes on a loaded CI runner. Without a
          # startupProbe, livenessProbe's own short failure budget kills the
          # container mid-boot and it restart-loops, never finishing initdb.
          # startupProbe defers liveness/readiness until MySQL responds once,
          # giving it up to ~5 minutes to come up before anything else acts.
          startupProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init
        # A disposable kind cluster is recreated every run, so there's no
        # need for a PersistentVolumeClaim here.
        - name: data
          emptyDir: {}
