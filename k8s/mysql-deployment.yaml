apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: production
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          # MySQL 8 auto-generates self-signed SSL certs and RSA keys on
          # first boot, drawing from /dev/random - this blocks for minutes
          # in low-entropy environments like nested-virtualization CI
          # runners (confirmed here: the first boot attempt sat for ~5
          # minutes never accepting a connection, got killed, and the
          # *second* attempt - reusing the now-initialized data dir - was
          # ready in 1 second). This is an ephemeral, in-cluster-only demo
          # DB with no need for TLS, so just skip that generation entirely.
          args:
            - --ssl=0
            - --sha256_password_auto_generate_rsa_keys=OFF
            - --caching_sha2_password_auto_generate_rsa_keys=OFF
            # In one CI run the server ended up listening on the datadir's
            # default socket (/var/lib/mysql/mysql.sock) instead of the one
            # /etc/my.cnf configures (/var/run/mysqld/mysqld.sock), which the
            # probes below assume via `-h localhost`. Pinning both sides to
            # the same explicit path removes any chance of that mismatch,
            # regardless of why the effective config diverged.
            - --socket=/var/run/mysqld/mysqld.sock
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-credentials
          volumeMounts:
            # db/init.sql, loaded into this ConfigMap at apply time (see
            # k8s/README.md) rather than duplicated into a committed manifest.
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping --socket=/var/run/mysqld/mysqld.sock -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping --socket=/var/run/mysqld/mysqld.sock -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping --socket=/var/run/mysqld/mysqld.sock -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init
        # A disposable kind cluster is recreated every run, so there's no
        # need for a PersistentVolumeClaim here.
        - name: data
          emptyDir: {}
